version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vace-postgres
    environment:
      POSTGRES_DB: vace_db
      POSTGRES_USER: vace_user
      POSTGRES_PASSWORD: vace_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vace_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vace-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
